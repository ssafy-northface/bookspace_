server:
  port: 8080

spring:
  application:
    name: bookspace # 애플리케이션 이름 추가 (관례)

  datasource:
    # RDS 관련 설정 (Env 변수 참조)
    driver-class-name: com.mysql.cj.jdbc.Driver
    # URL: DB_NAME과 DB_PORT 변수를 사용하여 URL 구성
    url: jdbc:mysql://localhost:3306/bookspace?serverTimezone=UTC&characterEncoding=UTF-8
    username: ssafy
    password: ssafy

mybatis:
  mapper-locations: classpath:/mappers/**/*.xml
  type-aliases-package: com.bookspace.domain
