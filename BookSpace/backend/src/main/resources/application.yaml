server:
  port: 8080

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: bookspace # 애플리케이션 이름 추가 (관례)

  datasource:
    # RDS 관련 설정 (Env 변수 참조)
    driver-class-name: com.mysql.cj.jdbc.Driver
    # URL: DB_NAME과 DB_PORT 변수를 사용하여 URL 구성
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?serverTimezone=UTC&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}


mybatis:
  mapper-locations: classpath:mappers/*.xml
  type-aliases-package: com.bookspace.domain
  configuration:
    map-underscore-to-camel-case: true
    #log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

aladin:
  ttbkey: ${ALADIN_TTB_KEY}


jwt:
  secret: ${JWT_SECRET}
  access-token-validity-ms: ${JWT_ACCESS_TOKEN_VALIDITY_MS:3600000}

gms:
  api:
    provider-key: ${GMS_PROVIDER_KEY}
    base-url: https://gms.ssafy.io/gmsapi
    openai:
      model: gpt-4.1-mini

# 이메일 설정
# 개발: Ethereal Email (https://ethereal.email) 사용 - 무료 테스트용
# 프로덕션: Gmail SMTP 사용
spring.mail:
  host: ${MAIL_HOST:smtp.ethereal.email}
  port: ${MAIL_PORT:587}
  username: ${MAIL_USERNAME}
  password: ${MAIL_PASSWORD}
  properties:
    mail:
      smtp:
        auth: true
        starttls:
          enable: true
          required: true
        connectiontimeout: 5000
        timeout: 5000
        writetimeout: 5000

# 앱 설정
app:
  email:
    # 개발 모드: true면 실제 이메일 발송 안 함 (콘솔에 인증 코드 출력)
    # 프로덕션에서는 false로 변경
    dev-mode: ${EMAIL_DEV_MODE:true}